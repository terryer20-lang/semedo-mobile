<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Semedo — Vocabulário</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Semedo">
  <meta name="theme-color" content="#e8ddce">
  <meta name="mobile-web-app-capable" content="yes">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{gelo:'#f5f0ea',azulejo:'#1a7bb5',porto:'#8b2252',lisboa:'#d4a843',certo:'#2d6a4f',erro:'#c1121f'}}}}</script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    /* ═══ CAPLE Glass — 暖色葡式磨砂 ═══ */

    body {
      background:
        radial-gradient(ellipse 80% 60% at 10% 85%, rgba(212,168,67,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 20%, rgba(26,123,181,0.08) 0%, transparent 60%),
        linear-gradient(165deg, #e8ddce 0%, #d6dbe3 40%, #cdd6e0 100%);
      min-height: 100vh;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, sans-serif;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      color: #1e293b;
    }

    /* ─── 磨砂玻璃卡片 ─── */
    .glass {
      background: rgba(255,255,255,0.72);
      -webkit-backdrop-filter: blur(24px) saturate(1.1);
      backdrop-filter: blur(24px) saturate(1.1);
      border: 0.5px solid rgba(255,255,255,0.7);
    }
    @supports not ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))) {
      .glass { background: rgba(255,255,255,0.85); }
    }
    .glass-strong {
      background: rgba(255,255,255,0.78);
      -webkit-backdrop-filter: blur(32px) saturate(1.15);
      backdrop-filter: blur(32px) saturate(1.15);
      border: 0.5px solid rgba(255,255,255,0.8);
      box-shadow: 0 8px 32px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.03);
    }
    @supports not ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))) {
      .glass-strong { background: rgba(255,255,255,0.9); }
    }

    /* ─── 導航欄 ─── */
    .nav-glass {
      background: rgba(255,255,255,0.72);
      -webkit-backdrop-filter: blur(32px) saturate(1.2);
      backdrop-filter: blur(32px) saturate(1.2);
      border-top: 0.5px solid rgba(255,255,255,0.6);
    }

    /* ─── 輸入框 ─── */
    .glass-input {
      background: rgba(255,255,255,0.5);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      border: 0.5px solid rgba(0,0,0,0.06);
      color: #1e293b;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-input::placeholder { color: rgba(0,0,0,0.25); }
    .glass-input:focus {
      border-color: rgba(26,123,181,0.3);
      box-shadow: 0 0 0 3px rgba(26,123,181,0.08);
      background: rgba(255,255,255,0.65);
      outline: none;
    }

    /* ─── 按鈕 ─── */
    .btn-primary {
      background: #1a7bb5;
      color: #fff;
      border-radius: 14px;
      transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-primary:active { transform: scale(0.96); background: #15628f; }
    .btn-primary:disabled { opacity: 0.4; }

    .btn-glass {
      background: transparent;
      border: 0.5px solid rgba(0,0,0,0.08);
      color: #475569;
      border-radius: 14px;
      transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-glass:active { background: rgba(0,0,0,0.04); transform: scale(0.96); }

    .btn-danger {
      background: rgba(193,18,31,0.08);
      border: 0.5px solid rgba(193,18,31,0.15);
      color: #c1121f;
      border-radius: 14px;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-danger:active { background: rgba(193,18,31,0.15); transform: scale(0.96); }

    /* ─── 底部導航 Tab ─── */
    .nav-tab {
      color: rgba(0,0,0,0.25);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    .nav-tab.active { color: #1a7bb5; }
    .nav-tab i { transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
    .nav-tab.active i { color: #1a7bb5; }
    .nav-pill {
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 3px;
      background: #1a7bb5;
      border-radius: 2px;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ─── 級別卡片 ─── */
    .level-card {
      background: rgba(255,255,255,0.68);
      -webkit-backdrop-filter: blur(20px) saturate(1.1);
      backdrop-filter: blur(20px) saturate(1.1);
      border: 0.5px solid rgba(255,255,255,0.6);
      border-radius: 20px;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .level-card:active {
      transform: scale(0.94);
      background: rgba(255,255,255,0.85);
    }
    .level-card .level-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 15px;
    }
    .level-card .level-label { font-weight: 600; font-size: 15px; color: #1e293b; }
    .level-card .level-count { font-size: 11px; color: #64748b; }

    /* ─── 閃卡區 ─── */
    .flashcard-word {
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.3;
      text-align: center;
    }
    .feedback-correct {
      background: rgba(45,106,79,0.10);
      border: 0.5px solid rgba(45,106,79,0.2);
    }
    .feedback-wrong {
      background: rgba(193,18,31,0.08);
      border: 0.5px solid rgba(193,18,31,0.15);
    }

    /* ─── 動畫系統 ─── */
    .anim-fade-up { animation: fade-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .anim-scale-in { animation: scale-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .anim-slide-up { animation: slide-up 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .anim-pop { animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .anim-bounce-in { animation: bounce-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .anim-shake { animation: shake 0.4s ease both; }
    .anim-pulse-soft { animation: pulse-soft 1.5s ease-in-out infinite; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scale-in {
      from { opacity: 0; transform: scale(0.88); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    @keyframes bounce-in {
      0% { opacity: 0; transform: scale(0.3); }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .stagger-1 { animation-delay: 0.04s; }
    .stagger-2 { animation-delay: 0.08s; }
    .stagger-3 { animation-delay: 0.12s; }
    .stagger-4 { animation-delay: 0.16s; }
    .stagger-5 { animation-delay: 0.20s; }
    .stagger-6 { animation-delay: 0.24s; }

    /* ─── 安全區域 ─── */
    .pb-safe { padding-bottom: var(--safe-bottom); }
    .pt-safe { padding-top: var(--safe-top); }

    /* ─── 滾動條 ─── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 2px; }

    /* ─── 過場動畫 ─── */
    .view-enter-active { transition: opacity 0.18s ease, transform 0.18s ease; }
    .view-leave-active { transition: opacity 0.12s ease, transform 0.12s ease; }
    .view-enter-from { opacity: 0; transform: translateY(10px); }
    .view-leave-to { opacity: 0; transform: translateY(-5px); }

    .fade-enter-active, .fade-leave-active { transition: opacity 0.15s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="store/storage.js"></script>
  <script src="data/uploaded_qecr_data.js"></script>
  <script src="utils/diacritics.js"></script>
  <script src="utils/sync.js"></script>
  <script src="utils/animation.js"></script>
  <script src="components/ConfigModal.js"></script>
  <script src="components/VocabView.js"></script>
  <script src="components/MeuLexicoView.js"></script>
  <script src="components/StudyStats.js"></script>
  <script src="components/AppShell.js"></script>
  <script src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(e => console.warn('[SW]', e))
      })
    }
  </script>
</body>
</html>
